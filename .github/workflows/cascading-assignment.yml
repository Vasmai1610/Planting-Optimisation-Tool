name: Cascade Assignment and Status to Sub-Issues

on:
  issues:
    types: [assigned, unassigned]

permissions:
  issues: write

jobs:
  cascade-to-sub-issues:
    runs-on: ubuntu-latest
    steps:
      - name: Cascade assignment and board status to sub-issues
        env:
          GH_TOKEN: ${{ secrets.BOARD_STATUS_CHANGER }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
          ASSIGNEE: ${{ github.event.assignee.login }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO_OWNER: ${{ github.repository_owner }}
          REPO_NAME: ${{ github.event.repository.name }}
          EVENT_ACTION: ${{ github.event.action }}
          PROJECT_NUMBER: 3
        run: |
          # ── 1. Fetch sub-issues ───────────────────────────────────────────
          SUB_ISSUES=$(gh api graphql \
            -H "GraphQL-Features: sub_issues" \
            -f query='
              query($id: ID!) {
                node(id: $id) {
                  ... on Issue {
                    subIssues(first: 50) {
                      nodes { 
                        number 
                        nodeId: id 
                      }
                    }
                  }
                }
              }
            ' \
            -f id="$ISSUE_NODE_ID" \
            --jq '.data.node.subIssues.nodes')

          if [ "$SUB_ISSUES" = "[]" ] || [ -z "$SUB_ISSUES" ]; then
            echo "No sub-issues found for issue #$ISSUE_NUMBER"
            exit 0
          fi

          # ── 2. Fetch project ID, Status field ID, and option IDs ──────────
          echo "Fetching project data..."
          PROJECT_DATA=$(gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              user(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -f owner="$REPO_OWNER" -F number="$PROJECT_NUMBER" 2>/dev/null || \
          gh api graphql -f query='
            query($owner: String!, $number: Int!) {
              organization(login: $owner) {
                projectV2(number: $number) {
                  id
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }
            }' -f owner="$REPO_OWNER" -F number="$PROJECT_NUMBER")

          PROJECT_ID=$(echo "$PROJECT_DATA" | jq -r '.. | .projectV2?.id? // empty' | head -1)
          STATUS_FIELD_ID=$(echo "$PROJECT_DATA" | jq -r '.. | .fields?.nodes[]? | select(.name=="Status") | .id // empty' | head -1)
          SPRINT_BACKLOG_ID=$(echo "$PROJECT_DATA" | jq -r '.. | .fields?.nodes[]? | select(.name=="Status") | .options[]? | select(.name=="Sprint Backlog") | .id // empty' | head -1)
          IN_PROGRESS_ID=$(echo "$PROJECT_DATA" | jq -r '.. | .fields?.nodes[]? | select(.name=="Status") | .options[]? | select(.name=="In progress") | .id // empty' | head -1)

          echo "Project: $PROJECT_ID | Status field: $STATUS_FIELD_ID"
          echo "Sprint Backlog: $SPRINT_BACKLOG_ID | In Progress: $IN_PROGRESS_ID"

          # ── 3. Determine target status ────────────────────────────────────
          if [ "$EVENT_ACTION" = "assigned" ]; then
            TARGET_STATUS_ID="$IN_PROGRESS_ID"
            TARGET_STATUS_NAME="In Progress"
          else
            TARGET_STATUS_ID="$SPRINT_BACKLOG_ID"
            TARGET_STATUS_NAME="Sprint Backlog"
          fi

          echo "Target status: $TARGET_STATUS_NAME ($TARGET_STATUS_ID)"

          # ── 4. Store sub-issues in array ──────────────────────────────────
          mapfile -t SUB_ISSUES_ARRAY < <(echo "$SUB_ISSUES" | jq -c '.[]')
          
          echo "Found ${#SUB_ISSUES_ARRAY[@]} sub-issues to process"

          # ── 5. Debug: Check project items for first sub-issue ─────────────
          if [ ${#SUB_ISSUES_ARRAY[@]} -gt 0 ]; then
            FIRST_SUB=$(echo "${SUB_ISSUES_ARRAY[0]}" | jq -r '.nodeId')
            echo "Debug: Checking project items for first sub-issue..."
            gh api graphql -f query='
              query($id: ID!) {
                node(id: $id) {
                  ... on Issue {
                    title
                    number
                    projectItems(first: 10) {
                      nodes { 
                        id
                        project {
                          id
                          title
                        }
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                              name
                            }
                          }
                        }
                      }
                    }
                  }
                }
              }' -f id="$FIRST_SUB"
          fi

          # ── 6. Loop through sub-issues ────────────────────────────────────
          for sub in "${SUB_ISSUES_ARRAY[@]}"; do
            SUB_NUMBER=$(echo "$sub" | jq -r '.number')
            SUB_NODE_ID=$(echo "$sub" | jq -r '.nodeId')

            echo "Processing sub-issue #$SUB_NUMBER"

            # Assign or unassign
            if [ "$EVENT_ACTION" = "assigned" ]; then
              echo "  Assigning #$SUB_NUMBER to $ASSIGNEE"
              gh api --method POST \
                "/repos/$REPO_OWNER/$REPO_NAME/issues/$SUB_NUMBER/assignees" \
                -f "assignees[]=$ASSIGNEE"
            else
              echo "  Unassigning $ASSIGNEE from #$SUB_NUMBER"
              echo "{\"assignees\": [\"$ASSIGNEE\"]}" | \
              gh api --method DELETE \
                "/repos/$REPO_OWNER/$REPO_NAME/issues/$SUB_NUMBER/assignees" \
                --input -
            fi

            # Update sub-issue project board status
            if [ -n "$PROJECT_ID" ] && [ -n "$STATUS_FIELD_ID" ] && [ -n "$TARGET_STATUS_ID" ]; then
              echo "  Looking for sub-issue #$SUB_NUMBER in project board..."
              
              # Get the project item ID with a more specific query
              PROJECT_ITEMS_QUERY=$(gh api graphql -f query='
                query($id: ID!, $projectId: ID!) {
                  node(id: $id) {
                    ... on Issue {
                      projectItems(first: 20) {
                        nodes { 
                          id
                          project {
                            id
                          }
                        }
                      }
                    }
                  }
                }' -f id="$SUB_NODE_ID" -f projectId="$PROJECT_ID" 2>/dev/null)
              
              # Debug output
              echo "  Debug: Project items query result for #$SUB_NUMBER:"
              echo "$PROJECT_ITEMS_QUERY" | jq '.'
              
              # Extract the item ID
              ITEM_ID=$(echo "$PROJECT_ITEMS_QUERY" | jq -r --arg pid "$PROJECT_ID" '.data.node.projectItems.nodes[] | select(.project.id==$pid) | .id' 2>/dev/null || echo "")

              if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
                echo "  Found project item: $ITEM_ID for #$SUB_NUMBER"
                echo "  Setting #$SUB_NUMBER status to $TARGET_STATUS_NAME"
                
                UPDATE_RESULT=$(gh api graphql -f query='
                  mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                    updateProjectV2ItemFieldValue(input: {
                      projectId: $projectId
                      itemId: $itemId
                      fieldId: $fieldId
                      value: { singleSelectOptionId: $optionId }
                    }) {
                      projectV2Item {
                        id
                        fieldValues(first: 10) {
                          nodes {
                            ... on ProjectV2ItemFieldSingleSelectValue {
                              field {
                                ... on ProjectV2SingleSelectField {
                                  name
                                }
                              }
                              name
                            }
                          }
                        }
                      }
                    }
                  }' \
                  -f projectId="$PROJECT_ID" \
                  -f itemId="$ITEM_ID" \
                  -f fieldId="$STATUS_FIELD_ID" \
                  -f optionId="$TARGET_STATUS_ID" 2>&1)
                
                if [ $? -eq 0 ]; then
                  echo "  ✅ Status updated successfully"
                  echo "  Debug: Update result: $UPDATE_RESULT" | head -3
                else
                  echo "  ❌ Failed to update status"
                  echo "  Error: $UPDATE_RESULT"
                fi
              else
                echo "  ⚠️ Sub-issue #$SUB_NUMBER not found in project board"
                echo "  Debug: Project ID being searched for: $PROJECT_ID"
                echo "  Debug: Full query result for project items:"
                echo "$PROJECT_ITEMS_QUERY" | jq '.'
              fi
            fi
          done